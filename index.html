<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOME 受注システム</title>
<style>
:root {
  --red: #D42D27; --red-dark: #a82420; --red-light: #fdeceb;
  --yellow: #FEC830; --yellow-dark: #e0ac1a; --yellow-light: #fff8e1;
  --green: #2e7d32; --orange: #e65100; --blue: #1565c0;
  --gray1: #1a1a1a; --gray2: #444; --gray3: #888; --gray4: #ddd; --gray5: #f5f5f5;
  --white: #fff; --shadow: 0 2px 10px rgba(0,0,0,.12); --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Meiryo",sans-serif; background: #f7f3ec; font-size: 14px; color: var(--gray1); height: 100vh; overflow: hidden; }

/* ===== STAFF SELECT SCREEN ===== */
#staff-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #b81818, #8f1111); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
#staff-screen.hidden { display: none; }
#staff-screen::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 50% 115%, rgba(254,200,48,.15), transparent 55%); pointer-events: none; }
#staff-screen .logo-wrap { background: var(--white); border-radius: 16px; padding: 16px 46px; box-shadow: 0 15px 35px rgba(0,0,0,.25); margin-bottom: 34px; z-index: 1; }
#staff-screen .logo-wrap svg { height: 54px; width: auto; display: block; }
#staff-screen h2 { color: #ffd336; font-size: 22px; letter-spacing: 3px; margin-bottom: 34px; z-index: 1; text-shadow: 0 2px 8px rgba(0,0,0,.35); }
#staff-slider { width: 82%; max-width: 1100px; height: 380px; display: flex; gap: 22px; z-index: 1; }
.staff-card { position: relative; flex: 1; border-radius: 26px; overflow: hidden; cursor: pointer; background: rgba(255,255,255,.08); border: 2px solid rgba(254,200,48,.7); transition: flex .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1), box-shadow .7s ease, background .5s ease; }
.staff-card:hover { flex: 2.2; transform: translateY(-12px); box-shadow: 0 25px 60px rgba(0,0,0,.35); background: #fec830; }
.staff-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top, rgba(255,255,255,.35), transparent 50%); opacity: 0; transition: opacity .5s ease; }
.staff-card:hover::before { opacity: 1; }
.staff-image { position: absolute; right: -30px; bottom: 0; height: 92%; width: auto; opacity: 0; transform: translateX(60px) scale(.9); transition: opacity .65s ease, transform .75s cubic-bezier(.22,1,.36,1); z-index: 1; pointer-events: none; }
.staff-card:hover .staff-image { opacity: 1; transform: translateX(0) scale(1); }
.staff-initial { position: absolute; top: 40px; left: 40px; width: 92px; height: 92px; border-radius: 50%; background: #fec830; color: #b51f1f; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; z-index: 2; transition: all .5s ease; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,.3); }
.staff-initial img { width: 100%; height: 100%; object-fit: cover; }
.staff-card:hover .staff-initial { transform: scale(.72); background: #fff; }
.staff-info { position: absolute; left: 40px; bottom: 40px; z-index: 2; transition: transform .5s ease; max-width: 78%; }
.staff-card:hover .staff-info { transform: translateY(-10px); }
.staff-info .number { font-size: 14px; color: rgba(255,255,255,.75); font-weight: 700; letter-spacing: 2px; transition: color .4s ease; }
.staff-card:hover .staff-info .number { color: #9b1111; }
.staff-info h3 { margin: 8px 0 0; font-size: 23px; line-height: 1.25; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.35); transition: color .4s ease, text-shadow .4s ease; }
.staff-card:hover .staff-info h3 { color: #9b1111; text-shadow: none; }
.staff-info .pick-btn { margin-top: 14px; padding: 10px 24px; border: none; border-radius: 999px; background: #fff; color: #b51f1f; font-weight: 800; font-size: 13px; cursor: pointer; opacity: 0; transform: translateY(15px); transition: all .45s ease; letter-spacing: 1px; }
.staff-card:hover .pick-btn { opacity: 1; transform: translateY(0); }
.pick-btn:hover { background: #9b1111; color: #fff; }
#staff-screen .hint { margin-top: 34px; opacity: .8; color: #fff; font-size: 13px; z-index: 1; }

/* Welcome overlay */
#welcome-screen { position: fixed; inset: 0; z-index: 2100; background: linear-gradient(135deg, #b81818, #8f1111); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px; opacity: 0; pointer-events: none; transition: opacity .5s ease; }
#welcome-screen.show { opacity: 1; pointer-events: auto; }
#welcome-avatar { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; border: 5px solid #fec830; box-shadow: 0 0 0 9px rgba(254,200,48,.25), 0 14px 50px rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; background: #fec830; font-size: 66px; font-weight: 900; color: #9b1111; transform: scale(.6); transition: transform .55s cubic-bezier(.2,1.2,.3,1); }
#welcome-screen.show #welcome-avatar { transform: scale(1); }
#welcome-avatar img { width: 100%; height: 100%; object-fit: cover; }
#welcome-text { color: #fff; font-size: 30px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 3px 14px rgba(0,0,0,.5); opacity: 0; transform: translateY(16px); transition: all .5s ease .25s; text-align: center; }
#welcome-screen.show #welcome-text { opacity: 1; transform: translateY(0); }
#welcome-text small { display: block; font-size: 14px; font-weight: 500; color: #ffd336; margin-top: 10px; letter-spacing: 3px; }

/* ===== TOP BAR ===== */
#topbar { height: 56px; background: var(--red); display: flex; align-items: center; gap: 10px; padding: 0 12px; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
#topbar .logo-box { background: var(--white); border-radius: 8px; padding: 4px 10px; display: flex; align-items: center; flex-shrink: 0; }
#topbar .logo-box svg { height: 30px; width: auto; display: block; }
#cust-id-wrap { position: relative; flex: 1; }
#cust-id-dd { position: absolute; top: calc(100% + 4px); left: 0; width: 340px; max-width: 90vw; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); z-index: 300; max-height: 300px; overflow-y: auto; display: none; border: 1px solid var(--gray4); }
#cust-id-dd.show { display: block; }
.cust-dd-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--gray5); }
.cust-dd-item:hover, .cust-dd-item.dd-active { background: var(--yellow-light); }
.cust-dd-name { font-weight: 700; font-size: 13px; }
.cust-dd-sub { font-size: 11px; color: var(--gray3); margin-top: 2px; }
#tabs-bar { display: flex; align-items: flex-end; gap: 4px; flex: 1; overflow-x: auto; scrollbar-width: none; height: 100%; padding-top: 10px; }
#tabs-bar::-webkit-scrollbar { display: none; }
.tab-item { display: flex; align-items: center; gap: 6px; padding: 7px 12px; background: rgba(255,255,255,.18); color: #fff; border-radius: 8px 8px 0 0; cursor: pointer; white-space: nowrap; font-size: 12px; font-weight: 600; min-width: 100px; max-width: 170px; height: 34px; }
.tab-item.active { background: #f7f3ec; color: var(--red-dark); }
.tab-close { font-size: 15px; opacity: .6; }
.tab-close:hover { opacity: 1; color: var(--red); }
.tab-badge { background: var(--yellow); color: var(--red-dark); border-radius: 10px; padding: 0 6px; font-size: 10px; font-weight: 800; }
#btn-new-tab { background: var(--yellow); color: var(--red-dark); border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 17px; font-weight: 800; margin-bottom: 4px; }
#topbar-right { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-shrink: 0; min-width: 0; }
#staff-chip { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.15); border: 1px solid var(--yellow); color: #fff; border-radius: 18px; padding: 3px 12px 3px 4px; font-size: 12px; font-weight: 600; cursor: pointer; }
#staff-chip .mini-av { width: 24px; height: 24px; border-radius: 50%; background: var(--yellow); color: var(--red-dark); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; }
#connection-status { font-size: 10px; color: #ffd; opacity: .95; white-space: nowrap; max-width: 72px; overflow: hidden; text-overflow: ellipsis; }
#connection-status.ok { color: #b9f6ca; }
#connection-status.err { color: #ffcdd2; }
.tb-btn { width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,.18); color: #fff; border: none; border-radius: 8px; padding: 0; cursor: pointer; font-size: 15px; line-height: 1; flex-shrink: 0; }
.tb-btn:hover { background: rgba(255,255,255,.3); }

/* ===== 3-COLUMN LAYOUT ===== */
#main { display: grid; grid-template-columns: 1fr 420px; height: calc(100vh - 56px); }

/* Col 1: Products */
#col-products { display: flex; flex-direction: column; background: var(--white); border-right: 1px solid var(--gray4); min-width: 0; min-height: 0; }
#product-search-bar { padding: 10px 12px; border-bottom: 2px solid var(--yellow); display: flex; gap: 8px; background: var(--yellow-light); }
#product-search-input { flex: 1; padding: 8px 12px; border: 1px solid var(--gray4); border-radius: 8px; font-size: 13px; outline: none; }
#product-search-input:focus { border-color: var(--red); }
#cat-filter { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--gray5); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; align-items: center; }
#sort-wrap { margin-left: auto; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
#sort-wrap label { font-size: 11px; color: var(--gray3); font-weight: 600; white-space: nowrap; }
#sort-select { padding: 4px 8px; border: 1px solid var(--gray4); border-radius: 20px; font-size: 12px; background: var(--white); color: var(--gray2); cursor: pointer; outline: none; }
#sort-select:focus { border-color: var(--red); }
#cat-filter::-webkit-scrollbar { display: none; }
.cat-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--gray4); background: var(--white); font-size: 12px; cursor: pointer; white-space: nowrap; color: var(--gray2); flex-shrink: 0; }
.cat-btn.active { background: var(--red); color: #fff; border-color: var(--red); font-weight: 700; }
#product-grid { flex: 1; min-height: 0; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; align-content: start; }
.product-card { position: relative; border: 1px solid var(--gray4); border-radius: 12px; cursor: pointer; overflow: hidden; transition: all .15s; background: var(--white); display: flex; flex-direction: row; align-items: stretch; min-height: 150px; content-visibility: auto; contain-intrinsic-size: 150px; }
.product-card:hover { border-color: var(--red); box-shadow: 0 4px 14px rgba(212,45,39,.22); transform: translateY(-2px); }
.pc-img-wrap { width: 42%; min-width: 76px; max-width: 130px; flex-shrink: 0; background: #fff; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--gray5); overflow: hidden; }
.pc-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
.pc-placeholder { font-size: 34px; }
.sale-ribbon { position: absolute; top: 10px; left: -32px; background: var(--red); color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 1px; padding: 3px 34px; transform: rotate(-45deg); box-shadow: 0 2px 6px rgba(0,0,0,.25); z-index: 2; }
.pc-body { padding: 7px 9px 8px; display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
.pc-sku { font-size: 10px; color: var(--gray3); font-weight: 600; }
.pc-name { font-size: 12px; font-weight: 700; line-height: 1.3; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-spec { font-size: 10px; color: var(--gray2); }
.pc-exp { font-size: 10px; color: var(--gray2); }
.pc-exp b { color: var(--gray1); }
.pc-exp.exp-warn { color: var(--red); font-weight: 800; animation: expBlink 1s ease-in-out infinite; }
.pc-exp.exp-warn b { color: var(--red); }
@keyframes expBlink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
.pc-price-row { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-top: auto; padding-top: 3px; flex-wrap: wrap; }
.pc-price-main { font-size: 15px; font-weight: 900; color: var(--gray1); white-space: nowrap; }
.pc-price-main.sale, .pc-price-case.sale { color: var(--red); }
.pc-price-case { font-size: 10px; font-weight: 700; color: var(--gray2); }
.pc-orig { font-size: 10px; color: var(--gray3); text-decoration: line-through; font-weight: 600; order: -1; flex-basis: 100%; }
.pc-price-line { display: flex; flex-wrap: wrap; align-items: baseline; gap: 1px 6px; }
.pc-stock, .pc-arrival { font-size: 10px; color: var(--gray2); }
.pc-meta-line .pc-spec { display: block; }
.pc-meta-line .pc-exp { display: block; margin-top: 1px; }
.pc-stock b { color: var(--gray1); }
.pc-arrival { color: var(--blue); }
.pc-arrival b { color: var(--blue); }
.pc-off { position: absolute; top: 4px; right: 10px; background: var(--red); color: #fff; font-size: 10px; font-weight: 800; border-radius: 20px; padding: 2px 7px; white-space: nowrap; z-index: 3; }
.product-card.pc-oos { filter: grayscale(0.9); opacity: .58; }
.product-card.pc-oos:hover { opacity: .8; filter: grayscale(0.6); }
.pc-oos-badge { position: absolute; top: 4px; left: 10px; background: var(--gray2); color: #fff; font-size: 10px; font-weight: 800; border-radius: 20px; padding: 2px 8px; white-space: nowrap; z-index: 3; letter-spacing: .5px; }
@media (max-width: 1500px) { #product-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 1200px) { #product-grid { grid-template-columns: repeat(3, 1fr); } }


/* Col 2: Order */
#col-order { display: flex; flex-direction: column; background: #fffdf8; min-width: 0; min-height: 0; }
#order-header { padding: 10px 12px; border-bottom: 2px solid var(--yellow); background: var(--yellow-light); flex-shrink: 0; }
.of { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.of:last-child { margin-bottom: 0; }
.of label { font-size: 11px; color: var(--gray3); white-space: nowrap; width: 56px; flex-shrink: 0; font-weight: 600; }
.of-val { font-size: 13px; font-weight: 700; flex: 1; }
.of-val-input { font-size: 13px; font-weight: 700; flex: 1; padding: 5px 8px; border: 1px solid var(--gray4); border-radius: 6px; outline: none; background: var(--white); }
.of-val-input:focus { border-color: var(--red); }
#hdr-id-input { color: var(--red); }
.of input, .of select { padding: 5px 8px; border: 1px solid var(--gray4); border-radius: 6px; font-size: 12px; outline: none; background: var(--white); }
.of input:focus, .of select:focus { border-color: var(--red); }
#choku-wrap { position: relative; flex: 1; }
#choku-input { width: 100%; }
#choku-dd { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--white); border-radius: 8px; box-shadow: var(--shadow); z-index: 100; max-height: 200px; overflow-y: auto; display: none; border: 1px solid var(--gray4); }
#choku-dd.show { display: block; }
.choku-item { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--gray5); }
.choku-item:hover, .choku-item.dd-active { background: var(--yellow-light); }
.ci-name { font-size: 12px; font-weight: 700; }
.ci-addr { font-size: 10px; color: var(--gray3); }
#cart-items { flex: 1 1 0; min-height: 0; overflow-y: auto; padding: 8px 10px; }
.cart-group-lbl { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; margin: 6px 0 4px; display: inline-block; }
.lbl-dry { background: #fff3e0; color: var(--orange); }
.lbl-cool { background: #e8f5e9; color: var(--green); }
.lbl-cold { background: #e3f2fd; color: var(--blue); }
.cart-row { display: flex; align-items: center; gap: 6px; padding: 6px 2px; border-bottom: 1px solid #f0ead9; }
.cr-name { flex: 1; min-width: 0; }
.cr-name strong { font-size: 12px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cr-name small { font-size: 10px; color: var(--gray3); }
.cart-disc { width: 54px; padding: 2px 4px; border: 1px solid #f0c0bd; border-radius: 4px; font-size: 11px; text-align: right; background: var(--red-light); }
.qty-ctrl { display: flex; align-items: center; gap: 2px; background: var(--gray5); border-radius: 20px; padding: 3px; flex-shrink: 0; }
.qty-btn { width: 22px; height: 22px; border: none; border-radius: 50%; background: var(--white); cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; color: var(--gray2); box-shadow: 0 1px 2px rgba(0,0,0,.15); flex-shrink: 0; }
.qty-btn:hover { background: var(--yellow-light); color: var(--red-dark); }
.qty-input { width: 34px; text-align: center; font-size: 12px; font-weight: 800; border: none; border-bottom: 2px solid var(--blue); background: transparent; color: var(--blue); outline: none; padding: 1px 0; -moz-appearance: textfield; }
.qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.qty-input:focus { color: var(--red-dark); border-bottom-color: var(--red); }
.cart-total { font-size: 12px; font-weight: 800; white-space: nowrap; min-width: 52px; text-align: right; }
.cart-del { color: var(--gray3); cursor: pointer; padding: 2px 4px; font-size: 16px; }
.cart-del:hover { color: var(--red); }
#summary { border-top: 2px solid var(--yellow); padding: 8px 12px; flex-shrink: 0; background: var(--yellow-light); max-height: 260px; overflow-y: auto; }
.sum-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 2px 0; }
.sum-row.group { font-weight: 700; border-top: 1px dashed var(--gray4); margin-top: 3px; padding-top: 4px; }
.sum-row.total { font-size: 16px; font-weight: 900; border-top: 2px solid var(--red); margin-top: 5px; padding-top: 6px; color: var(--red-dark); }
.sum-row.disc { color: var(--red); font-weight: 600; }
.sum-group-card { border-radius: 8px; padding: 6px 8px; margin-bottom: 8px; border-left: 4px solid; }
.sum-group-card .sg-title { font-size: 11px; font-weight: 800; margin-bottom: 3px; }
.sum-group-card .sum-row { padding: 1px 0; }
.sum-group-card .sum-row.group { border-top: 1px dashed rgba(0,0,0,.15); margin-top: 3px; padding-top: 3px; }
.sgc-dry { background: #fff3e0; border-color: var(--orange); } .sgc-dry .sg-title { color: var(--orange); }
.sgc-cool { background: #e8f5e9; border-color: var(--green); } .sgc-cool .sg-title { color: var(--green); }
.sgc-cold { background: #e3f2fd; border-color: var(--blue); } .sgc-cold .sg-title { color: var(--blue); }
.sum-label { color: var(--gray2); }
.ship-in, .cod-in { width: 68px; padding: 2px 5px; border: 1px solid var(--gray4); border-radius: 4px; font-size: 11px; text-align: right; }
.cod-row { background: var(--red-light); border-radius: 6px; padding: 4px 6px; margin: 3px 0; }
#bottom-bar { display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid var(--gray4); flex-shrink: 0; background: var(--white); align-items: center; }
#disc-wrap { display: flex; align-items: center; gap: 6px; }
#disc-wrap label { font-size: 11px; color: var(--red); white-space: nowrap; font-weight: 700; }
#disc-input { width: 84px; padding: 7px 8px; border: 1px solid #f0c0bd; border-radius: 8px; font-size: 12px; text-align: right; outline: none; background: var(--red-light); }
#btn-print { flex: 1; background: linear-gradient(135deg, var(--red), var(--red-dark)); color: #fff; border: none; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 800; cursor: pointer; letter-spacing: .5px; }
#btn-print:hover { filter: brightness(1.1); }

/* Col 3 -> Drawer trượt từ phải */
#col-chat { position: fixed; top: 56px; right: 0; bottom: 0; width: 360px; display: flex; flex-direction: column; background: var(--white); box-shadow: -6px 0 24px rgba(0,0,0,.18); transform: translateX(105%); transition: transform .3s cubic-bezier(.2,.9,.3,1); z-index: 500; }
#col-chat.open { transform: translateX(0); }
#chat-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--red-dark); margin-left: auto; line-height: 1; }
#btn-cust-info { background: var(--white); color: var(--red-dark); border: 2px solid var(--yellow); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
#btn-cust-info:hover { background: var(--yellow-light); }
#chat-header { padding: 10px 12px; background: var(--yellow); border-bottom: 1px solid var(--yellow-dark); font-size: 13px; font-weight: 800; color: var(--red-dark); flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
#chat-body { flex: 1; overflow-y: auto; padding: 12px; }
.info-card { background: #fffdf5; border: 1px solid var(--yellow); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
.info-card h4 { font-size: 11px; color: var(--gray3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.ir { display: flex; margin-bottom: 6px; font-size: 12px; }
.ir label { width: 74px; color: var(--gray3); flex-shrink: 0; }
.ir span { font-weight: 600; flex: 1; word-break: break-word; }
.msg-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: none; border-radius: 8px; background: #0084ff; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
.msg-btn:hover { background: #006fd6; }
.msg-btn.secondary { background: var(--white); color: #0084ff; border: 2px solid #0084ff; }
.msg-btn:disabled { background: var(--gray4); cursor: default; }
.chat-note { font-size: 11px; color: var(--gray3); line-height: 1.6; background: var(--gray5); border-radius: 8px; padding: 10px; }
.tag-chip { display: inline-block; background: var(--yellow-light); border: 1px solid var(--yellow); color: var(--gray2); border-radius: 12px; padding: 2px 10px; font-size: 11px; margin: 0 4px 4px 0; }
.note-item { background: var(--gray5); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; font-size: 12px; }
.note-item .nd { font-size: 10px; color: var(--gray3); margin-top: 3px; }

/* Loading + modal */
#loading { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 999; }
#loading.hidden { display: none; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(254,200,48,.35); border-top-color: var(--yellow); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#settings-modal, #history-modal, #oos-modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
#settings-modal.hidden, #history-modal.hidden, #oos-modal.hidden { display: none; }
.modal { background: #fff; border-radius: 12px; padding: 24px; width: 470px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.modal.wide { width: min(920px, calc(100vw - 28px)); max-height: calc(100vh - 34px); display: flex; flex-direction: column; padding: 0; overflow: hidden; }
.modal h2 { margin-bottom: 16px; font-size: 16px; color: var(--red-dark); }
.modal.wide h2 { margin: 0; padding: 15px 18px; border-bottom: 1px solid var(--gray4); background: var(--yellow-light); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.modal label { font-size: 12px; color: var(--gray3); display: block; margin-bottom: 4px; }
.modal input { width: 100%; padding: 9px 10px; border: 1px solid var(--gray4); border-radius: 8px; font-size: 13px; margin-bottom: 14px; outline: none; }
.modal input:focus { border-color: var(--red); }
.modal-btns { display: flex; gap: 8px; }
.btn-primary { background: var(--red); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; flex: 1; }
.btn-ghost { background: var(--gray5); color: var(--gray2); border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; }
.icon-close { width: 30px; height: 30px; border: none; border-radius: 8px; background: rgba(212,45,39,.12); color: var(--red-dark); cursor: pointer; font-size: 18px; }
.history-tools { display: flex; gap: 8px; padding: 10px 18px; border-bottom: 1px solid var(--gray4); align-items: center; background: #fff; }
.history-tools input { margin: 0; width: 220px; }
.history-body { overflow: auto; min-height: 240px; }
.history-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
.history-table th { position: sticky; top: 0; background: var(--red); color: #fff; padding: 8px; text-align: left; white-space: nowrap; }
.history-table td { border-bottom: 1px solid var(--gray5); padding: 8px; vertical-align: top; word-break: break-word; }
.history-table tr.history-row { cursor: pointer; }
.history-table tr.history-row:hover td { background: #fff3d6; }
.history-table tr.history-row.active td { background: #fdeceb; }
.history-time { font-weight: 800; color: var(--red-dark); white-space: nowrap; }
.history-total { text-align: right; font-weight: 800; }
.history-order-id { font-weight: 800; color: var(--red-dark); white-space: nowrap; }
.history-detail-cell { background: #fffdf8; padding: 0 !important; }
.history-detail { padding: 12px 14px 14px; border-left: 4px solid var(--yellow); }
.history-detail-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px 12px; margin-bottom: 12px; font-size: 12px; }
.history-detail-grid b { display: block; color: var(--gray3); font-size: 10px; margin-bottom: 2px; }
.history-items { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 12px; }
.history-items th { background: #444; color: #fff; padding: 6px; text-align: left; }
.history-items td { border-bottom: 1px solid var(--gray5); padding: 6px; }
.history-empty { padding: 28px; text-align: center; color: var(--gray3); }

.cart-price { min-width: 62px; text-align: right; font-size: 12px; font-weight: 800; color: var(--gray1); border-bottom: 1px dashed var(--gray3); cursor: pointer; padding: 1px 2px; white-space: nowrap; }
.cart-price.discounted { color: var(--red); }
#price-pop { position: fixed; background: #fff; border: 1px solid var(--gray4); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.18); padding: 10px 12px; z-index: 1500; width: 216px; }
#price-pop .pp-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
#price-pop .pp-row:last-child { margin-bottom: 0; }
#price-pop label { font-size: 11px; color: var(--gray3); flex-shrink: 0; }
#price-pop input { width: 86px; padding: 4px 6px; border: none; border-bottom: 1px solid var(--gray4); font-size: 13px; text-align: right; outline: none; font-weight: 700; }
#price-pop input:focus { border-bottom-color: var(--blue); }
#price-pop input[readonly] { color: var(--gray2); font-weight: 600; }
.pp-tg { display: inline-flex; border: 1px solid var(--gray4); border-radius: 6px; overflow: hidden; }
.pp-tg button { border: none; background: var(--gray5); color: var(--gray2); font-size: 11px; padding: 3px 8px; cursor: pointer; font-weight: 700; }
.pp-tg button.active { background: var(--blue); color: #fff; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #d9cba8; border-radius: 3px; }

@media (max-width: 1280px) { #main { grid-template-columns: 1fr 390px; } }
</style>
</head>
<body>

<!-- STAFF SELECT -->
<div id="staff-screen">
  <div class="logo-wrap"><svg viewBox="0 0 2457.8 500.1" xmlns="http://www.w3.org/2000/svg"><!-- KOME_LOGO_SVG --></svg></div>
  <h2>― 担当者を選択 ―</h2>
  <div id="staff-slider"></div>
  <p class="hint">Chọn người lên đơn để bắt đầu</p>
</div>

<!-- WELCOME -->
<div id="welcome-screen">
  <div id="welcome-avatar"></div>
  <div id="welcome-text"></div>
</div>

<div id="loading" class="hidden"><div class="spinner"></div></div>
<div id="settings-modal" class="hidden">
  <div class="modal">
    <h2>⚙️ Cài đặt kết nối</h2>
    <label>Google Apps Script URL</label>
    <input id="setting-url" placeholder="https://script.google.com/macros/s/...">
    <div class="modal-btns">
      <button class="btn-primary" onclick="saveSettings()">Lưu & Tải dữ liệu</button>
      <button class="btn-ghost" onclick="closeSettings()">Hủy</button>

</div>

<div id="history-modal" class="hidden">
  <div class="modal wide">
    <h2>
      <span>Lịch sử đơn hàng</span>
      <button class="icon-close" onclick="closeOrderHistory()" title="Đóng">×</button>
    </h2>
    <div class="history-tools">
      <input id="history-search" placeholder="Tìm mã KH, tên khách, sản phẩm..." oninput="renderOrderHistory()">
      <button class="btn-primary" onclick="loadOrderHistory(true)" style="flex:0 0 auto;">Tải lại</button>
    </div>
    <div id="history-body" class="history-body">
      <div class="history-empty">Chưa tải dữ liệu lịch sử</div>
    </div>

</div>

<div id="oos-modal" class="hidden">
  <div class="modal" style="width:380px;">
    <h2>⚠️ Sản phẩm đã hết hàng</h2>
    <p id="oos-modal-text" style="font-size:13px;color:var(--gray2);line-height:1.6;margin-bottom:18px;"></p>
    <div class="modal-btns">
      <button class="btn-primary" onclick="confirmOOSAdd()">Vẫn thêm vào đơn</button>
      <button class="btn-ghost" onclick="closeOOSModal()">Hủy</button>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo-box"><svg viewBox="0 0 2457.8 500.1" xmlns="http://www.w3.org/2000/svg"><!-- KOME_LOGO_SVG --></svg></div>

  <div id="tabs-bar"></div>
  <div id="topbar-right">
    <div id="staff-chip" onclick="showStaffScreen()" title="Đổi người lên đơn">
      <div class="mini-av" id="staff-mini-av">?</div>
      <span id="staff-chip-name">Chưa chọn</span>
    </div>
    <span id="connection-status">●</span>
    <button class="tb-btn" onclick="reloadData()" title="Tải lại dữ liệu">↻</button>
    <button class="tb-btn" onclick="openOrderHistory()" title="Lịch sử đơn hàng">≡</button>
    <button class="tb-btn" onclick="openSettings()" title="Cài đặt">⚙</button>
  </div>
</div>

<!-- MAIN 3 COLUMNS -->
<div id="main">
  <!-- COL 1: PRODUCTS -->
  <div id="col-products">
    <div id="product-search-bar">
      <input id="product-search-input" placeholder="🔍 Tìm theo SKU, tên Việt hoặc tên Nhật... (F3)" autocomplete="off">
    </div>
    <div id="cat-filter"></div>
    <div id="product-grid"></div>
  </div>

  <!-- COL 2: ORDER -->
  <div id="col-order">
    <div id="order-header">
     <div class="of"><label>Mã KH</label>
        <div id="cust-id-wrap"><input id="hdr-id-input" class="of-val-input" placeholder="Nhập hoặc tìm mã KH (F4)..." autocomplete="off" oninput="onCustIdInput()" onfocus="onCustIdInput()"><div id="cust-id-dd"></div></div>
        <button id="btn-cust-info" onclick="toggleCustInfo()">👤 Thông tin & liên hệ</button>
      </div>
      <div class="of"><label>Khách</label><input id="hdr-customer-input" class="of-val-input" placeholder="Tên khách hàng..." oninput="onCustNameInput()"></div>
      <div class="of"><label>直送先</label>
        <div id="choku-wrap"><input id="choku-input" placeholder="Tìm địa chỉ giao hàng..."><div id="choku-dd"></div></div>
      </div>
      <div class="of"><label>時間帯</label>
        <select id="delivery-time" style="flex:1;">
          <option value="">--</option><option>最短</option><option>午前中</option>
          <option>12時～14時</option><option>14時～16時</option><option>16時～18時</option><option>18時～20時</option>
        </select>
        <select id="delivery-month" style="width:50px;"><option value="">月</option></select>
        <span style="font-size:11px;">/</span>
        <select id="delivery-day" style="width:50px;"><option value="">日</option></select>
      </div>
      <div class="of"><label>Ghi chú</label><input id="order-note" placeholder="Ghi chú đơn hàng..." style="flex:1;"></div>
    </div>
    <div id="cart-items"></div>
    <div id="summary"></div>
    <div id="bottom-bar">
      <div id="disc-wrap"><label>割引</label><input type="number" id="disc-input" min="0" step="100" value="0"><span style="font-size:11px;color:var(--gray3);">¥</span></div>
      <button id="btn-print" onclick="handlePrint()">🖨 Tạo & In Đơn hàng</button>
    </div>
  </div>

  <!-- COL 3: CUSTOMER INFO + MESSENGER -->

    <div id="chat-body">
      <div class="chat-note">← Chọn khách hàng để xem thông tin và mở chat Messenger</div>
    </div>

</div>

<script>
// ============ CONFIG ============
const SHEET_URL_KEY='kome_sheet_url', CACHE_KEY='kome_data_cache_v3', STAFF_KEY='kome_staff';
const CACHE_TTL=15*60*1000, RENDER_CHUNK=40;
const TAX10=['BS01','BS02','BS04','BS06','HAB05','HAB06','HAL02','HAL03','HAL08','HAL11','LD01','LD02','RV01','RV02','RV03','RV05','RV06','RV07','RV09'];
const STAFF_LIST=[
  {name:'Trình Công Minh',    short:'M', avatar:'./images/minh.png'},
  {name:'Trần Thị Lan Thanh', short:'T', avatar:'./images/thanh.png'},
  {name:'Hà Huy Long',        short:'L', avatar:'./images/long.png'},
  {name:'愛華 本田',           short:'愛', avatar:'./images/aika.png'},
];

let sheetUrl=localStorage.getItem(SHEET_URL_KEY)||'';
let currentStaff=localStorage.getItem(STAFF_KEY)||'';
let customerData={}, productData=[], chokuData=[], orderHistoryData=[];
let expandedHistoryOrderId='';
let currentPage=1, filteredProducts=[], currentCat='all', currentSort='default';
let tabs=[], activeTabId=null, tabCounter=0;
let msgWindow=null;
let custDdIdx=-1, chokuDdIdx=-1;

// ============ STAFF SELECT ============
function renderStaffScreen(){
  document.getElementById('staff-slider').innerHTML = STAFF_LIST.map((s,i)=>`
    <div class="staff-card" onclick="selectStaff(${i})">
      <img class="staff-image" src="${s.avatar}" alt="" onerror="this.remove()">
      <div class="staff-initial"><span>${s.short}</span></div>
      <div class="staff-info">
        <div class="number">0${i+1}</div>
        <h3>${s.name}</h3>
        <button class="pick-btn" type="button">選択する</button>
      </div>
    </div>`).join('');
}
function selectStaff(i){
  const s=STAFF_LIST[i];
  currentStaff=s.name;
  localStorage.setItem(STAFF_KEY,currentStaff);
  const ws=document.getElementById('welcome-screen');
  document.getElementById('welcome-avatar').innerHTML=s.avatar?`<img src="${s.avatar}" onerror="this.outerHTML='${s.short}'">`:s.short;
  document.getElementById('welcome-text').innerHTML=`Xin chào, ${s.name}!<small>CHÚC BẠN MỘT NGÀY LÊN ĐƠN THUẬN LỢI</small>`;
  ws.classList.add('show');
  document.getElementById('staff-screen').classList.add('hidden');
  updateStaffChip();
  setTimeout(()=>{ ws.classList.remove('show'); }, 2000);
}
function showStaffScreen(){ document.getElementById('staff-screen').classList.remove('hidden'); }
function updateStaffChip(){
  const s=STAFF_LIST.find(x=>x.name===currentStaff);
  document.getElementById('staff-chip-name').textContent=currentStaff||'Chưa chọn';
  document.getElementById('staff-mini-av').textContent=s?s.short:'?';
}

// ============ TABS ============
function newTab(){
  tabCounter++;
  const id='tab_'+tabCounter;
  tabs.push({id,customer:null,choku:null,cart:[],freeShip:{dry:null,cool:null,cold:null},customDaibiki:null,discount:0,deliveryTime:'',deliveryMonth:'',deliveryDay:'',note:''});
  setActiveTab(id);
  return id;
}
function getTab(){ return tabs.find(t=>t.id===activeTabId); }
function setActiveTab(id){
  activeTabId=id; renderTabs(); renderOrderHeader(); renderCart(); renderChatPanel();
  const t=getTab(); if(!t) return;
  document.getElementById('delivery-time').value=t.deliveryTime;
  document.getElementById('delivery-month').value=t.deliveryMonth;
  document.getElementById('delivery-day').value=t.deliveryDay;
  document.getElementById('order-note').value=t.note;
  document.getElementById('disc-input').value=t.discount;
  document.getElementById('choku-input').value=t.choku?t.choku.name:'';
}
function closeTab(id,e){
  e&&e.stopPropagation();
  tabs=tabs.filter(t=>t.id!==id);
  if(!tabs.length) newTab();
  else if(activeTabId===id) setActiveTab(tabs[tabs.length-1].id);
  renderTabs();
}
function renderTabs(){
  const bar=document.getElementById('tabs-bar');
  bar.innerHTML=tabs.map(t=>{
    const nm=t.customer?(t.customer.name.slice(0,12)+(t.customer.name.length>12?'…':'')):'新規注文';
    const n=t.cart.reduce((s,i)=>s+i.qty,0);
    return `<div class="tab-item ${t.id===activeTabId?'active':''}" onclick="setActiveTab('${t.id}')">
      <span style="overflow:hidden;text-overflow:ellipsis;">${nm}</span>
      ${n>0?`<span class="tab-badge">${n}</span>`:''}
      <span class="tab-close" onclick="closeTab('${t.id}',event)">×</span>
    </div>`;
  }).join('')+`<button id="btn-new-tab" onclick="newTab()" title="Đơn mới">+</button>`;
}

// ============ SETTINGS / DATA ============
function openSettings(){ document.getElementById('setting-url').value=sheetUrl; document.getElementById('settings-modal').classList.remove('hidden'); }
function closeSettings(){ document.getElementById('settings-modal').classList.add('hidden'); }
function saveSettings(){
  const u=document.getElementById('setting-url').value.trim();
  if(!u) return alert('Vui lòng nhập URL');
  sheetUrl=u; localStorage.setItem(SHEET_URL_KEY,u); closeSettings(); loadData(true);
}
// Cache-first (stale-while-revalidate): hiện cache ngay, tải mới chạy ngầm
async function loadData(force=false){
  if(!sheetUrl){ openSettings(); return; }
  let hasCache=false;
  if(!force){
    const c=localStorage.getItem(CACHE_KEY);
    if(c){ try{
      const{ts,data}=JSON.parse(c);
      applyData(data); hasCache=true; setStatus('ok');
      if(Date.now()-ts<CACHE_TTL) return;   // cache còn tươi -> khỏi gọi server
    }catch(e){} }
  }
  if(!hasCache) showLoading(true);          // chỉ chặn màn hình khi KHÔNG có gì để hiện
  setStatus('loading');
  try{
    const j=await fetchJSONP(sheetUrl);
    if(j.status==='success'){
      localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:j.data}));
      applyData(j.data); setStatus('ok');
    }else if(!hasCache) setStatus('err',j.message);
  }catch(e){ if(!hasCache) setStatus('err',e.message); else setStatus('ok'); }
  showLoading(false);
}
function fetchJSONP(url){
  return new Promise((res,rej)=>{
    const cb='kome_cb_'+Date.now(), s=document.createElement('script');
    const t=setTimeout(()=>{cl();rej(new Error('Timeout'));},15000);
    window[cb]=d=>{cl();res(d);};
    function cl(){clearTimeout(t);delete window[cb];s.parentNode&&s.parentNode.removeChild(s);}
    s.onerror=()=>{cl();rej(new Error('Script error'));};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    document.head.appendChild(s);
  });
}
function openOrderHistory(){
  document.getElementById('history-modal').classList.remove('hidden');
  if(!orderHistoryData.length) loadOrderHistory();
}
function closeOrderHistory(){ document.getElementById('history-modal').classList.add('hidden'); }
async function loadOrderHistory(force=false){
  if(!sheetUrl){ openSettings(); return; }
  const body=document.getElementById('history-body');
  body.innerHTML='<div class="history-empty">Đang tải lịch sử...</div>';
  try{
    const sep=sheetUrl.includes('?')?'&':'?';
    const j=await fetchJSONP(sheetUrl+sep+'action=getOrderHistory&limit=120');
    if(j.status==='success'){
      orderHistoryData=j.data||[];
      renderOrderHistory();
    }else{
      body.innerHTML=`<div class="history-empty">Lỗi tải lịch sử: ${escapeHtml(j.message||'Không rõ lỗi')}</div>`;
    }
  }catch(e){
    body.innerHTML=`<div class="history-empty">Lỗi tải lịch sử: ${escapeHtml(e.message)}</div>`;
  }
}
function renderOrderHistory(){
  const body=document.getElementById('history-body');
  const q=(document.getElementById('history-search')?.value||'').toLowerCase().trim();
  const rows=getHistoryOrders().filter(o=>{
    if(!q) return true;
    const items=(o.items||[]).map(i=>`${i.sku||''} ${i.productName||''} ${i.productNameJP||''}`).join(' ');
    return `${o.orderId||''} ${o.time||''} ${o.customerId||''} ${o.customerName||''} ${o.grandTotal||''} ${o.note||''} ${items}`.toLowerCase().includes(q);
  });
  if(!rows.length){ body.innerHTML='<div class="history-empty">Không có dữ liệu phù hợp</div>'; return; }
  body.innerHTML=`<table class="history-table"><thead><tr>
    <th style="width:150px;">Mã đơn hàng</th><th style="width:140px;">Thời gian</th><th style="width:90px;">Mã KH</th><th>Tên khách hàng</th><th style="width:110px;">Tổng tiền</th>
  </tr></thead><tbody>${rows.map(o=>renderHistoryOrderRow(o)).join('')}</tbody></table>`;
}
function getHistoryOrders(){
  const raw=orderHistoryData||[];
  if(!raw.length) return [];
  if(raw[0] && Array.isArray(raw[0].items)) return raw;
  const orders=[];
  raw.forEach((r,idx)=>{
    const hasHead=!!(r.time||r.customerId||r.customerName||r.grandTotal);
    let current=hasHead?null:orders[orders.length-1];
    if(!current){
      current={
        orderId:r.orderId||buildHistoryOrderId(r,idx),
        time:r.time||'', customerId:r.customerId||'', customerName:r.customerName||'',
        chokuId:r.chokuId||'', chokuName:r.chokuName||'', staff:r.staff||'',
        shippingFee:r.shippingFee||'', codFee:r.codFee||'', discount:r.discount||'',
        tax:r.tax||'', grandTotal:r.grandTotal||r.lineTotal||'', deliveryTime:r.deliveryTime||'',
        note:r.note||'', items:[]
      };
      orders.push(current);
    }
    if(r.sku||r.productName||r.qty){
      current.items.push({
        sku:r.sku||'', productName:r.productName||'', productNameJP:r.productNameJP||'',
        qty:r.qty||'', price:r.price||'', lineTotal:r.lineTotal||''
      });
    }
  });
  return orders;
}
function buildHistoryOrderId(o,idx){
  const compact=String(o.time||'').replace(/\D/g,'').slice(0,8);
  return `KOME-${compact||String(idx+1).padStart(4,'0')}-${o.customerId||'NA'}`;
}
function renderHistoryOrderRow(o){
  const id=o.orderId||buildHistoryOrderId(o,0);
  const active=expandedHistoryOrderId===id;
  return `<tr class="history-row ${active?'active':''}" onclick="toggleHistoryDetail('${jsString(id)}')">
    <td class="history-order-id">${escapeHtml(id)}${(o.status||'').includes('キャンセル')?' <span style="color:var(--red);font-size:10px;">(ĐÃ HỦY)</span>':''}</td>
    <td class="history-time">${escapeHtml(o.time||'')}</td>
    <td>${escapeHtml(o.customerId||'')}</td>
    <td>${escapeHtml(o.customerName||'')}</td>
    <td class="history-total">${escapeHtml(o.grandTotal||'')}</td>
  </tr>${active?`<tr><td class="history-detail-cell" colspan="5">${renderHistoryDetail(o)}</td></tr>`:''}`;

function normVN(s){
  return String(s||'')
    .toLowerCase()
    .normalize('NFD')                 // tách dấu ra khỏi chữ cái
    .replace(/[\u0300-\u036f]/g,'')   // xóa toàn bộ dấu thanh/dấu mũ
    .replace(/đ/g,'d')                // đ không thuộc nhóm trên nên xử lý riêng
    .trim();
}
function filterProducts(q){
  const sq=(q||'').toLowerCase().trim();
  const sqn=normVN(sq);
  filteredProducts=productData.filter(p=>{
    const mc=currentCat==='all'||p.category===currentCat;
    if(!sq) return mc;
    // Dùng chuỗi tính sẵn (_hay/_hayn) — vẫn tìm trên TOÀN BỘ sản phẩm
    const hay=p._hay!==undefined?p._hay:`${p.sku||''} ${p.name||''} ${p.nameJP||''}`.toLowerCase();
    const hayn=p._hayn!==undefined?p._hayn:normVN(hay);
    return mc&&(hay.includes(sq)||hayn.includes(sqn));
  });
  applySort();
  currentPage=1; renderProducts();
}
function parseDateVal(v){
  if(!v) return null;
  const s=String(v).trim();
  const m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3])).getTime();
  const d=new Date(s); return isNaN(d)?null:d.getTime();
}
function applySort(){
  const num=v=>parseFloat(String(v||'').replace(/,/g,''))||0;
  const isSale=p=>{const pr=num(p.price),ps=num(p.priceSale);return ps>0&&ps<pr;};
  if(currentSort==='sale'){
    filteredProducts.sort((a,b)=>(isSale(b)?1:0)-(isSale(a)?1:0));
  }else if(currentSort==='stock'){
    filteredProducts.sort((a,b)=>num(b.stock)-num(a.stock));
  }else if(currentSort==='exp'){
    filteredProducts.sort((a,b)=>{
      const da=parseDateVal(a.expirationDate||a.expiry), db=parseDateVal(b.expirationDate||b.expiry);
      if(da===null&&db===null) return 0;
      if(da===null) return 1; if(db===null) return -1;   // không có hạn -> xuống cuối
      return da-db;   // hạn gần nhất lên đầu
    });
  }else if(currentSort==='arrival'){
    filteredProducts.sort((a,b)=>{
      const da=parseDateVal(fieldVal(a,'Expected arrival date')), db=parseDateVal(fieldVal(b,'Expected arrival date'));
      if(da===null&&db===null) return 0;
      if(da===null) return 1; if(db===null) return -1;   // không có hàng về -> xuống cuối
      return da-db;   // ngày về gần nhất lên đầu
    });
  }
}
function fmtDate(v){
  if(!v) return '';
  const s=String(v).trim();
  // Đã đúng dạng yyyy/mm/dd
  let m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) return `${m[1]}/${String(m[2]).padStart(2,'0')}/${String(m[3]).padStart(2,'0')}`;
  const d=new Date(s);
  if(!isNaN(d)) return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  return s;
}
function isExpiringSoon(v){
  if(!v) return false;
  const s=String(v).trim();
  let d=null;
  const m=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m) d=new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  else { const t=new Date(s); if(!isNaN(t)) d=t; }
  if(!d||isNaN(d)) return false;
  const limit=new Date();
  limit.setMonth(limit.getMonth()+6);   // mốc: hôm nay + 6 tháng
  return d<limit;                        // hạn nằm trước mốc => sắp hết hạn
}
function imgSrc(u){
  if(!u) return '';
  u=String(u).trim();
  // Nhận diện file ID từ các dạng link Google Drive
  let id='';
  let m=u.match(/drive\.google\.com\/file\/d\/([\w-]+)/); if(m) id=m[1];
  if(!id){ m=u.match(/[?&]id=([\w-]+)/); if(m&&u.includes('google.com')) id=m[1]; }
  if(id) return 'https://drive.google.com/thumbnail?id='+id+'&sz=w200';
  return u;
}
function packQty(v){
  const s=String(v||'');
  const m=s.match(/[x×]\s*(\d+(?:\.\d+)?)/i);
  return m?parseFloat(m[1])||0:0;
}
function productDisplayName(v){
  let s=String(v||'').trim();
  if(!s) return '';
  s=s
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/\\n/g,'\n')
    .split(/\r?\n/)[0]
    .split(/\s+[\u2013\u2014-]\s+/)[0]
    .trim();
  const parts=s.split(/\s+/);
  const hasVietnamese=ch=>/[^\x00-\x7F]/.test(ch);
  const isEnglishToken=t=>/^[A-Za-z0-9'&().,+/-]+$/.test(t);
  const isSubNameStart=t=>/^(A-?ONE|FOCO|HALICO|Wafers?|Crepe|Stick|Chocolate|Flavor|Passion|Fruit|Juice|Nep|Cam|Liqueur|Ramen|Tom|Yum|Beef|Pho|Soup|Sauce|Fish|Meat|Braising|Pork|Noodles?|Drink|Base|Spicy|Braised|Grilled|Shrimp|Chips?|Big|Size|Spare|Rib|Sweet|Sour)$/i.test(t);
  if(parts.some(hasVietnamese)){
    for(let i=1;i<parts.length;i++){
      const suffix=parts.slice(i);
      if(suffix.length>=1&&isSubNameStart(suffix[0])&&suffix.every(isEnglishToken)){
        return parts.slice(0,i).join(' ').trim();
      }
    }
  }
  return s.replace(/\s{2,}/g,' ');
}
function fieldVal(row,key){
  if(!row) return '';
  const target=String(key).toLowerCase().replace(/[\s_-]/g,'');
  for(const [k,v] of Object.entries(row)){
    if(String(k).toLowerCase().replace(/[\s_-]/g,'')===target) return v;
  }
  return '';
}
// HTML của 1 card sản phẩm (tách riêng để render theo cụm)
function productCardHtml(p){
  const num=v=>parseFloat(String(v||'').replace(/,/g,''))||0;
  const pr=num(p.price), ps=num(p.priceSale);           // giá thùng / sale thùng
  const rt=num(p.retail), rts=num(p.retailSale);        // giá lẻ / sale lẻ
  const packsize=String(fieldVal(p,'packsize')||'').trim();
  const qtyInCase=packQty(packsize);
  const unitFromCase=v=>qtyInCase>0?Math.round(v/qtyInCase):0;
  const baseRetail=rt||unitFromCase(pr);
  const saleRetail=rts||unitFromCase(ps);
  const onSale=(ps>0&&ps<pr)||(saleRetail>0&&saleRetail<baseRetail);
  const offBase=(ps>0&&ps<pr)?pr:baseRetail;
  const offSale=(ps>0&&ps<pr)?ps:saleRetail;
  const off=(onSale&&offBase>0)?Math.round((1-offSale/offBase)*100):0;
  const casePrice=onSale&&ps>0?ps:pr;
  const retailPrice=onSale&&saleRetail>0?saleRetail:baseRetail;
  const origCasePrice=pr;
  const origRetailPrice=baseRetail;
  const productName=productDisplayName(p.name);
  const exp=(p.expirationDate||p.expiry||'').trim();
  // Hiển thị: giá lẻ to (giá thùng trong ngoặc); không có giá lẻ thì hiện giá thùng
  const showRetail=retailPrice>0;
  const priceClass=onSale?' sale':'';
  let unitHtml=showRetail
    ? `<span class="pc-price-main${priceClass}">¥${retailPrice.toLocaleString('ja-JP')}</span> <span class="pc-price-case${priceClass}">(¥${casePrice.toLocaleString('ja-JP')})</span>`
    : `<span class="pc-price-main${priceClass}">¥${casePrice.toLocaleString('ja-JP')}</span>`;
  let origHtml='';
  if(onSale){
    const om=origRetailPrice>0?`¥${origRetailPrice.toLocaleString('ja-JP')} (¥${origCasePrice.toLocaleString('ja-JP')})`:`¥${origCasePrice.toLocaleString('ja-JP')}`;
    origHtml=`<span class="pc-orig">${om}</span>`;
  }
  const stockNum=parseFloat(String(p.stock||0).replace(/,/g,''))||0;
  const arrivalAmount=String(fieldVal(p,'Amount')||'').trim();
  const arrivalDate=String(fieldVal(p,'Expected arrival date')||'').trim();
  const hasArrival=arrivalDate!==''&&arrivalAmount!==''&&arrivalAmount!=='未注文'&&arrivalDate!=='未注文';
  const img=p.image?`<img src="${imgSrc(p.image)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='<div class=pc-placeholder>📦</div>'">`:`<div class="pc-placeholder">📦</div>`;
  const isOOS=stockNum<=0;
  return `<div class="product-card${isOOS?' pc-oos':''}" onclick="addToCart('${p.sku}')">
    ${isOOS?`<div class="pc-oos-badge">HẾT HÀNG</div>`:onSale?`<div class="sale-ribbon">SALE</div>`:''}
    <div class="pc-img-wrap">${img}</div>
    <div class="pc-body">
      <div class="pc-sku">${p.sku}</div>
      <div class="pc-name">${productName}</div>
      ${(packsize||exp)?`<div class="pc-meta-line">
        ${packsize?`<span class="pc-spec">${packsize}</span>`:''}
        ${exp?`<span class="pc-exp${isExpiringSoon(exp)?' exp-warn':''}"><b>EXP:</b> ${fmtDate(exp)}</span>`:''}
      </div>`:''}
      <div class="pc-stock">Tồn kho: <b>${stockNum.toLocaleString('ja-JP')}</b></div>
      ${hasArrival?`<div class="pc-arrival">Hàng về: <b>${arrivalAmount}</b> (${fmtDate(arrivalDate)})</div>`:''}
      <div class="pc-price-row">
        <div class="pc-price-line">${unitHtml}${origHtml}</div>
        ${onSale?`<span class="pc-off">-${off}%</span>`:''}
      </div>
    </div>
  </div>`;
}

function getShipType(cat){
  if(!cat) return 'dry';
  const c=cat.toLowerCase();
  if(c.includes('1.đông lạnh')||c.includes('冷凍')) return 'cold';
  if(c.includes('2.sứa')||c.includes('冷蔵')) return 'cool';
  return 'dry';
}
let pendingOOSSku=null;
function addToCart(sku){
  const t=getTab(); if(!t) return;
  if(!t.customer){ alert('Vui lòng chọn khách hàng trước!'); return; }
  const p=productData.find(x=>x.sku===sku); if(!p) return;
  const stockNum=parseFloat(String(p.stock||0).replace(/,/g,''))||0;

}

function doAddToCart(p){
  const t=getTab(); if(!t) return;
  const pr=parseFloat((p.price||'').replace(/,/g,''))||0, ps=parseFloat((p.priceSale||'').replace(/,/g,''))||0;
  const fp=ps>0&&ps<pr?ps:pr;
  const isXot=(p.category||'').toLowerCase().includes('xốt');
  const q=isXot?0.25:1;
  const shipType=(p.sku==='XT02')?'cool':getShipType(p.category||'');
  const ex=t.cart.find(x=>x.sku===p.sku);
  if(ex) ex.qty=Math.round((ex.qty+q)*100)/100;
  else t.cart.push({sku:p.sku,name:p.name,nameJP:p.nameJP||'',price:fp,originalPrice:pr,qty:q,isXot,shippingType:shipType,discount:0,discountType:'yen'});
  renderCart(); renderTabs();
}
function effPrice(i){
  const d=i.discount||0;
  if(i.discountType==='pct') return Math.max(0,Math.round(i.price*(1-d/100)));
  return Math.max(0,i.price-d);
}

function renderCart(){
  const t=getTab();
  const cartEl=document.getElementById('cart-items'), sumEl=document.getElementById('summary');
  if(!t||!t.cart.length){ cartEl.innerHTML='<div style="text-align:center;color:var(--gray3);padding:24px;font-size:12px;">Giỏ hàng đang trống...</div>'; sumEl.innerHTML=''; return; }
  const groups=[{key:'dry',label:'常温品 (Hàng Khô)',cls:'lbl-dry',sgc:'sgc-dry'},{key:'cool',label:'冷蔵品 (Hàng Mát)',cls:'lbl-cool',sgc:'sgc-cool'},{key:'cold',label:'冷凍品 (Hàng Lạnh)',cls:'lbl-cold',sgc:'sgc-cold'}];
  let cartHtml='', sumHtml='', subAll=0;
  groups.forEach(g=>{
    const items=t.cart.filter(x=>x.shippingType===g.key);
    if(!items.length) return;
    cartHtml+=`<span class="cart-group-lbl ${g.cls}">${g.label}</span>`;
    let sub=0,crates=0;
    items.forEach(it=>{
      const ep=effPrice(it);
      const tot=Math.round(it.isXot?ep*(it.qty/0.25):ep*it.qty);
      sub+=tot;crates+=it.qty;
      cartHtml+=`<div class="cart-row"><div class="cr-name"><strong>${it.name}</strong><small>${it.sku}</small></div>
        <div class="qty-ctrl"><button class="qty-btn" onclick="chgQty('${it.sku}',-1)">−</button><input type="number" class="qty-input" value="${it.qty}" min="${it.isXot?0.25:1}" step="${it.isXot?0.25:1}" onclick="this.select()" onkeydown="if(event.key==='Enter')this.blur()" onchange="setQty('${it.sku}',this.value)"><button class="qty-btn" onclick="chgQty('${it.sku}',1)">+</button></div>
        <span class="cart-price${(it.discount||0)>0?' discounted':''}" onclick="openPricePop('${it.sku}',event)" title="Bấm để chỉnh giá">¥${effPrice(it).toLocaleString('ja-JP')}</span>
        <span class="cart-total">¥${tot.toLocaleString('ja-JP')}</span><span class="cart-del" onclick="delItem('${it.sku}')">×</span></div>`;
    });
    const xt02It=items.find(x=>x.sku==='XT02');
    const defS=(xt02It&&xt02It.qty>=2)?0:(sub<20000?crates*500:0);
    const ship=t.freeShip[g.key]!==null?t.freeShip[g.key]:defS;
    const gt=sub+ship; subAll+=gt;
    sumHtml+=`<div class="sum-group-card ${g.sgc}">
<div class="sg-title">${g.label}</div>
<div class="sum-row"><span class="sum-label">商品</span><span>¥${sub.toLocaleString('ja-JP')}</span></div>
<div class="sum-row"><span class="sum-label">送料 <input type="number" class="ship-in" value="${ship}" min="0" step="100" onchange="updShip('${g.key}',this.value)"></span><span>¥${ship.toLocaleString('ja-JP')}</span></div>
<div class="sum-row group"><span>小計</span><span>¥${gt.toLocaleString('ja-JP')}</span></div>
</div>`;
  });
  cartEl.innerHTML=cartHtml;
  let cod=0;
  if(t.customer?.seikyu==='代引請求'){
    const def=subAll>=20000?300:330;
    cod=t.customDaibiki!==null?t.customDaibiki:def;
    sumHtml+=`<div class="sum-row cod-row"><span class="sum-label" style="color:var(--red);font-weight:700;">代引き手数料 <input type="number" class="cod-in" value="${cod}" min="0" step="10" onchange="updCod(this.value)"></span><span style="color:var(--red);font-weight:800;">¥${cod.toLocaleString('ja-JP')}</span></div>`;
  }
  t.discount=parseInt(document.getElementById('disc-input').value)||0;
  const fin=Math.max(0,subAll+cod-t.discount);
  const itemSum=items=>items.reduce((s,i)=>s+(i.isXot?(effPrice(i))*(i.qty/0.25):(effPrice(i))*i.qty),0);
  const cShip=(items,tp)=>{if(t.freeShip[tp]!==null)return t.freeShip[tp];const xt=items.find(x=>x.sku==='XT02');if(xt&&xt.qty>=2)return 0;const s=items.reduce((a,i)=>a+(i.isXot?(effPrice(i))*(i.qty/0.25):(effPrice(i))*i.qty),0);return s<20000?items.reduce((a,i)=>a+i.qty,0)*500:0;};
  // Gom toàn đơn theo thuế suất, mỗi suất tính & làm tròn xuống 1 lần (インボイス方式)
  const goods8=itemSum(t.cart.filter(i=>!TAX10.includes(i.sku)));
  const goods10=itemSum(t.cart.filter(i=>TAX10.includes(i.sku)));
  const shipAll=['dry','cool','cold'].reduce((s,tp)=>s+cShip(t.cart.filter(x=>x.shippingType===tp),tp),0);
  // Phân bổ chiết khấu tổng theo tỉ lệ doanh thu của từng thuế suất
  const disc0=t.discount||0;
  const base10=goods10+shipAll+cod;
  const baseAll=goods8+base10;
  const d10=baseAll>0?Math.round(disc0*base10/baseAll):0;
  const d8=disc0-d10;
  const tax8=Math.floor(Math.max(0,goods8-d8)*8/108);
  const tax10=Math.floor(Math.max(0,base10-d10)*10/110);
  const tax=tax8+tax10;
  if(t.discount>0) sumHtml+=`<div class="sum-row disc"><span>割引 (Giảm giá)</span><span>-¥${t.discount.toLocaleString('ja-JP')}</span></div>`;
  sumHtml+=`<div class="sum-row"><span class="sum-label">消費税</span><span>¥${tax.toLocaleString('ja-JP')}</span></div>`;
  sumHtml+=`<div class="sum-row total"><span>合計 (TỔNG)</span><span>¥${fin.toLocaleString('ja-JP')}</span></div>`;
  sumEl.innerHTML=sumHtml;
}

  const dm=document.getElementById('delivery-month').value, dd=document.getElementById('delivery-day').value;
  const dt=document.getElementById('delivery-time').value, nt=document.getElementById('order-note').value;
  const dDate=(dm&&dd)?`${dm}/${dd}`:'';
  const parts=[];
  if(dDate)parts.push(`【希望納品日: ${dDate}】`);
  if(dt)parts.push(`【時間帯: ${dt}】`);
  if(nt)parts.push(nt);
  const orderNote=parts.join(' ');
  let dc='',dn='',da='';
  if(t.choku){const s=t.choku;dc=s.code;dn=s.name;da=`〒${s.post} ${s.pref}${s.city}${s.add1} ${s.add2}`.trim();}
  else{const ty=document.getElementById('choku-input').value.trim();if(ty)dc=ty;}
  const groups=[{key:'dry',label:'常温品 (Hàng Khô)',cls:'group-dry'},{key:'cool',label:'冷蔵品 (Hàng Mát)',cls:'group-cool'},{key:'cold',label:'冷凍品 (Hàng Lạnh)',cls:'group-cold'}];
  const cShip=(items,tp)=>{if(t.freeShip[tp]!==null)return t.freeShip[tp];const xt=items.find(x=>x.sku==='XT02');if(xt&&xt.qty>=2)return 0;const s=items.reduce((a,i)=>a+(i.isXot?(effPrice(i))*(i.qty/0.25):(effPrice(i))*i.qty),0);return s<20000?items.reduce((a,i)=>a+i.qty,0)*500:0;};
  let allHtml='',grand=0,allCr=0;
  groups.forEach(g=>{
    const items=t.cart.filter(x=>x.shippingType===g.key);
    if(!items.length)return;
    let sub=0,cr=0,rn=0,rows='';
    items.forEach(it=>{
      rn++;const ep=effPrice(it);
      const tot=Math.round(it.isXot?ep*(it.qty/0.25):ep*it.qty);
      sub+=tot;cr+=it.qty;
      const dp=it.isXot?ep*4:ep, dop=it.isXot?it.originalPrice*4:it.originalPrice;
      let pc=`¥${dp.toLocaleString('ja-JP')}`;
      if(dp<dop)pc+=`<br><small style="text-decoration:line-through;color:#999;">(¥${dop.toLocaleString('ja-JP')})</small>`;
      rows+=`<tr><td style="text-align:center;color:#666;">${rn}</td><td>${it.sku}</td><td>${it.name}<br><small>${it.nameJP}</small></td><td style="text-align:right;">${it.qty}</td><td>${pc}</td><td style="text-align:right;">¥${tot.toLocaleString('ja-JP')}</td></tr>`;
    });
    const ship=cShip(items,g.key), gt=sub+ship;
    grand+=gt;allCr+=cr;
    allHtml+=`<div class="gt ${g.cls}">${g.label}</div><table class="dt"><thead><tr><th style="width:5%">行</th><th style="width:10%">コード</th><th style="width:43%">商品名</th><th style="width:13%">数量(ケース)</th><th style="width:12%">単価(標準)</th><th style="width:17%">金額</th></tr></thead><tbody>${rows}
<tr style="border-top:2px solid #333;"><td colspan="3" style="border:none;"></td><td colspan="2" class="sl">商品合計 (ケース数: ${cr})</td><td class="sv">¥${sub.toLocaleString('ja-JP')}</td></tr>
<tr><td colspan="3" style="border:none;"></td><td colspan="2" class="sl">送料</td><td class="sv">¥${ship.toLocaleString('ja-JP')}</td></tr>
<tr><td colspan="3" style="border:none;"></td><td colspan="2" class="sl total">小計 (${g.label})</td><td class="sv total">¥${gt.toLocaleString('ja-JP')}</td></tr></tbody></table>`;
  });
  const itemSum=items=>items.reduce((s,i)=>s+(i.isXot?(effPrice(i))*(i.qty/0.25):(effPrice(i))*i.qty),0);
  let cod=0,codHtml='';
  if(t.customer?.seikyu==='代引請求'){
    const def=grand>=20000?300:330;
    cod=t.customDaibiki!==null?t.customDaibiki:def;
    codHtml=`<tr class="cod"><td class="tl">代引き手数料</td><td></td><td class="tv" style="color:#D42D27;">¥${cod.toLocaleString('ja-JP')}</td></tr>`;
  }
  // Gom toàn đơn theo thuế suất, mỗi suất làm tròn xuống 1 lần (インボイス方式)
  const goods8=itemSum(t.cart.filter(i=>!TAX10.includes(i.sku)));
  const goods10=itemSum(t.cart.filter(i=>TAX10.includes(i.sku)));
  const shipAll=['dry','cool','cold'].reduce((s,tp)=>s+cShip(t.cart.filter(x=>x.shippingType===tp),tp),0);
  // Phân bổ chiết khấu tổng theo tỉ lệ doanh thu của từng thuế suất
  const disc0=t.discount||0;
  const base10=goods10+shipAll+cod;
  const baseAll=goods8+base10;
  const d10=baseAll>0?Math.round(disc0*base10/baseAll):0;
  const d8=disc0-d10;
  const tax8=Math.floor(Math.max(0,goods8-d8)*8/108);
  const tax10=Math.floor(Math.max(0,base10-d10)*10/110);
  const tax=tax8+tax10, disc=t.discount||0;
  const fin=Math.max(0,grand+cod-disc);
  const discHtml=disc>0?`<tr><td class="tl">割引 (Giảm giá)</td><td></td><td class="tv" style="color:#D42D27;">-¥${disc.toLocaleString('ja-JP')}</td></tr>`:'';
  const c=t.customer;
  const salesRep = (currentStaff==='愛華 本田') ? currentStaff : (c.pic||'');
  const html=`<html><head><title>注文書 - ${c.name}</title><meta charset="UTF-8"><style>
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;margin:0;font-size:8pt;color:#000;background:#f4f4f4}
#inv{max-width:1000px;margin:0 auto;padding:10px 12px;background:#fff}
h1{font-size:14pt;text-align:center;margin:2px 0 14px}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:4px 5px;vertical-align:middle;line-height:1.3}
.ht{table-layout:fixed}.ht .lb{background:#f9f9f9;text-align:center;font-weight:bold;width:15%;white-space:nowrap}.ht .vl{width:35%;overflow-wrap:break-word}.ht .sep{border:none;padding:3px 0;height:3px}
.gt{font-size:8pt;font-weight:bold;margin:14px 0 6px;border-bottom:2px solid #000;padding-bottom:3px}
.group-dry{border-color:#e65100}.group-cool{border-color:#2e7d32}.group-cold{border-color:#1565c0}
.dt th{background:#444;color:#fff;padding:5px;text-align:center;white-space:nowrap;font-size:8pt;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.dt tbody tr:nth-child(even){background:#f9f9f9}.dt small{font-size:7pt;color:#555}
.sl{text-align:right;background:#f9f9f9;font-size:8pt;font-weight:bold}.sv{text-align:right;font-size:10pt;font-weight:bold}
.sl.total{background:#eee;font-size:9pt}.sv.total{background:#eee;font-size:12pt;font-weight:900}
.ft{margin-top:14px;width:100%}.ft td{border:1px solid #ddd;padding:6px 10px;font-size:9pt;font-weight:bold}
.tl{text-align:right;background:#f9f9f9;width:55%}.tq{text-align:center;width:20%;background:#f9f9f9;white-space:nowrap;font-size:9pt}.tv{text-align:right;width:25%;font-size:11pt;font-weight:900}
.cod td{background:#fff3f3;border-color:#f3c3c3}
.ns{border:1px solid #ccc;border-radius:4px;overflow:hidden;margin-bottom:10px}
.ns .lb{font-weight:bold;font-size:9pt;padding:4px 8px;background:#f9f9f9;border-bottom:1px solid #ddd}
.ns .cnt{padding:5px 8px;white-space:pre-wrap;font-size:9pt}
@media print{body{background:#fff}#inv{box-shadow:none}.np{display:none}}
</style></head><body>
<button class="np" onclick="window.print()" style="padding:10px 20px;font-size:16px;margin:10px;cursor:pointer;">🖨 In Hóa Đơn</button>
<div id="inv"><h1>注 文 請 書 (小売店専用 / ケース販売)</h1>
<table class="ht">
<tr><td class="lb">得意先コード</td><td class="vl">${c.id}</td><td class="lb">日付</td><td class="vl">${new Date().toLocaleDateString('ja-JP')}</td></tr>
<tr><td class="lb">会社名</td><td class="vl" colspan="3">${c.name}</td></tr>
<tr><td class="lb">住所</td><td class="vl" colspan="3">${c.address||''}</td></tr>
<tr><td colspan="4" class="sep"></td></tr>
${(dc||dn)?`<tr><td class="lb">納品先コード</td><td class="vl">${dc}</td><td class="lb">納品先名</td><td class="vl">${dn}</td></tr>
<tr><td class="lb">住所</td><td class="vl" colspan="3">${da}</td></tr>
<tr><td colspan="4" class="sep"></td></tr>`:''}
<tr><td class="lb">営業担当</td><td class="vl">${salesRep}</td><td class="lb">役職</td><td class="vl"></td></tr>
</table>
<div style="text-align:center;font-weight:bold;margin:14px 0 8px;font-size:11pt;">明 細</div>
<div class="ns"><div class="lb">補足事項</div><div class="cnt">${orderNote.replace(/\n/g,'<br>')}</div></div>
${allHtml}
<table class="ft">${codHtml}${discHtml}
<tr><td class="tl">合 計</td><td class="tq">${allCr.toLocaleString()} ケース</td><td class="tv"><strong>¥${fin.toLocaleString('ja-JP')}</strong><div style="font-size:8pt;font-weight:normal;color:#888;margin-top:2px;">(Đã bao gồm thuế: ¥${tax.toLocaleString('ja-JP')})</div></td></tr>
</table></div></body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);w.document.close();w.focus();
  setTimeout(()=>w.print(),500);
  if(sheetUrl){
    fetch(sheetUrl,{method:'POST',body:JSON.stringify({action:'saveOrder',data:{
      customerId:c.id,customerName:c.name,address:c.address||'',chokuId:dc,chokuName:dn,staff:salesRep,
      items:t.cart.map(it=>{
        const ep=effPrice(it);
        const unitPrice = it.isXot ? it.price*4 : it.price;
        const unitDiscount = it.isXot ? (it.price-ep)*4 : (it.price-ep);
        return {
          sku:it.sku,
          name:it.name,
          nameJP:it.nameJP,
          qty:it.qty,
          price:unitPrice,
          discount:unitDiscount,
          total:Math.round(it.isXot?ep*(it.qty/.25):ep*it.qty),
          shipType:it.shippingType||'dry'
        };
      }),
      shippingFee:['dry','cool','cold'].reduce((s,tp)=>s+cShip(t.cart.filter(x=>x.shippingType===tp),tp),0),
      shippingFees:{dry:cShip(t.cart.filter(x=>x.shippingType==='dry'),'dry'),cold:cShip(t.cart.filter(x=>x.shippingType==='cold'),'cold'),cool:cShip(t.cart.filter(x=>x.shippingType==='cool'),'cool')},
      codFee:cod,discount:disc,tax:tax,grandTotal:fin,deliveryTime:dt,deliveryDate:dDate,note:nt
    }})})
    .then(r=>r.text())
    .then(txt=>{
      console.log('[saveOrder] Phản hồi từ server:', txt);
      let j=null; try{ j=JSON.parse(txt); }catch(e){}
      if(j && j.status==='error') alert('Lưu đơn thất bại: '+(j.message||'Không rõ lỗi'));
    })
    .catch(err=>{
      console.error('[saveOrder] Lỗi khi lưu đơn hàng:', err);
      alert('Lưu đơn thất bại: '+err.message);
    });
  }
}

// ============ SHORTCUTS + INIT ============
document.addEventListener('keydown',e=>{
  if(e.key==='F4'){e.preventDefault();document.getElementById('hdr-id-input').focus();}
  if(e.key==='F3'){e.preventDefault();document.getElementById('product-search-input').focus();}
});
window.addEventListener('DOMContentLoaded',()=>{
  // Populate month/day selects
  const ms=document.getElementById('delivery-month'), ds=document.getElementById('delivery-day');
  for(let i=1;i<=12;i++){const o=document.createElement('option');o.textContent=i;ms.appendChild(o);}
  for(let i=1;i<=31;i++){const o=document.createElement('option');o.textContent=i;ds.appendChild(o);}
  renderStaffScreen();
  updateStaffChip();
  if(currentStaff) document.getElementById('staff-screen').classList.add('hidden');
  newTab();
  if(sheetUrl) loadData(); else openSettings();
});
</script>
</body>
</html>
